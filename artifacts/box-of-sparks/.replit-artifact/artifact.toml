kind = "web"
previewPath = "/"
title = "Box of Sparks"
version = "1.0.0"
id = "artifacts/box-of-sparks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18539

[services.development]
run = "pnpm --filter @workspace/box-of-sparks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/box-of-sparks", "run", "build" ]
publicDir = "artifacts/box-of-sparks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18539"
BASE_PATH = "/"
